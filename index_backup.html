<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Weather Station</title>
    <!-- MQTT Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #eceff1; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { display: flex; gap: 20px; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); text-align: center; width: 220px; }
        .temp-card { border-top: 5px solid #ff5722; }
        .hum-card { border-top: 5px solid #2196f3; }
        h2 { margin: 0; color: #546e7a; font-size: 1rem; text-transform: uppercase; }
        .value { font-size: 3rem; font-weight: bold; margin: 15px 0; color: #263238; }
        .source { font-size: 0.8rem; color: #90a4ae; font-style: italic; }
    </style>
</head>
<body>

    <div class="container">
        <!-- Temperature Card (via Mosquitto MQTT) -->
        <div class="card temp-card">
            <h2>Temperature</h2>
            <div id="temp-val" class="value">--</div>
            <div class="source">via MQTT (Mosquitto)</div>
        </div>

        <!-- Humidity Card (via ESP32 API) -->
        <div class="card hum-card">
            <h2>Humidity</h2>
            <div id="hum-val" class="value">--</div>
            <div class="source">via ESP32 API (HTTP)</div>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const BROKER_IP = "192.168.1.181";   // Your Computer's IP (Running Docker)
        const ESP32_IP  = "192.168.1.182";  // Your ESP32's IP from the logs
        const MQTT_PORT = 9001;             // WebSocket port from mosquitto.conf
        const TEMP_TOPIC = "sensors/weather/temperature";

        // --- 1. MQTT SETTINGS (Temperature) ---
        const client = new Paho.MQTT.Client(BROKER_IP, MQTT_PORT, "web_client_" + Math.random().toString(16).substr(2, 8));

        // This handles incoming messages
        client.onMessageArrived = (message) => {
            console.log("New Temp Received:", message.payloadString);
            document.getElementById("temp-val").innerText = message.payloadString + "°C";
        };

        client.onConnectionLost = (responseObject) => {
            if (responseObject.errorCode !== 0) {
                console.log("Connection Lost:", responseObject.errorMessage);
            }
        };

        client.connect({
            useSSL: false,
            onSuccess: () => {
                console.log("Connected to local Docker Mosquitto!");
                client.subscribe(TEMP_TOPIC);
            },
            onFailure: (err) => {
                console.log("MQTT Connect Failed:", err);
            }
        });

        // --- 2. API SETTINGS (Humidity) ---
        async function updateHumidity() {
            try {
                // Fetching from the ESP32 directly
                const response = await fetch(`http://${ESP32_IP}/api/humidity`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("hum-val").innerText = data.humidity.toFixed(1) + "%";
                }
            } catch (err) {
                console.error("API Error:", err);
                document.getElementById("hum-val").innerText = "Err";
            }
        }

        // Refresh humidity every 5 seconds
        setInterval(updateHumidity, 5000);
        updateHumidity();
    </script>
</body>
</html>
